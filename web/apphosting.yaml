# Firebase App Hosting – Geofence Next.js app
# Set app root to "web" when creating the backend if repo root is parent.
# https://firebase.google.com/docs/app-hosting/configure
#
# Database: connect via Cloud SQL public IP (no Unix socket).
# Set secret CLOUD_SQL_PUBLIC_IP to your instance's public IP:
#   firebase apphosting:secrets:set CLOUD_SQL_PUBLIC_IP
# Get the IP from: Cloud Console → SQL → your instance → Overview → Public IP.

runConfig:
  cpu: 1
  memoryMiB: 512

env:
  - variable: PGHOST
    secret: CLOUD_SQL_PUBLIC_IP
    availability: [RUNTIME]
  - variable: PGPORT
    value: "5432"
    availability: [RUNTIME]
  - variable: PGDATABASE
    value: geodata
    availability: [RUNTIME]
  - variable: PGUSER
    value: geofence
    availability: [RUNTIME]
  - variable: PGPASSWORD
    secret: PG_PASSWORD
    availability: [RUNTIME]
  # TrackSolid API (Import GPS data > Fetch devices). Set via: firebase apphosting:secrets:set TRACKSOLID_*
  - variable: TRACKSOLID_APP_KEY
    secret: TRACKSOLID_APP_KEY
    availability: [RUNTIME]
  - variable: TRACKSOLID_APP_SECRET
    secret: TRACKSOLID_APP_SECRET
    availability: [RUNTIME]
  - variable: TRACKSOLID_ACCOUNT
    secret: TRACKSOLID_ACCOUNT
    availability: [RUNTIME]
  - variable: TRACKSOLID_PASSWORD_MD5
    secret: TRACKSOLID_PASSWORD_MD5
    availability: [RUNTIME]