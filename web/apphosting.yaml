# Firebase App Hosting – Geofence Next.js app
# Set app root to "web" when creating the backend if repo root is parent.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 512

env:
  - variable: PGHOST
    value: /cloudsql/cel-geosystem:australia-southeast1:geofence
    availability: [RUNTIME]
  - variable: PGPORT
    value: "5432"
    availability: [RUNTIME]
  - variable: PGDATABASE
    value: geodata
    availability: [RUNTIME]
  - variable: PGUSER
    value: geofence
    availability: [RUNTIME]
  - variable: PGPASSWORD
    secret: PG_PASSWORD
    availability: [RUNTIME]
